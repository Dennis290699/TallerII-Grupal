name: Build and Release

# Se activa cuando creas un tag que empieza con 'v', por ejemplo: v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    permissions:
      contents: write # Necesario para crear la Release

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Dar permisos de ejecución al script de gradle (necesario en algunos entornos)
      - name: Dar permisos a gradlew
        run: chmod +x gradlew
        shell: bash

      # Ejecutar la tarea para construir el JAR con dependencias (Fat JAR)
      - name: Construir el Super JAR
        run: ./gradlew shadowJar

      # Generar el ejecutable nativo de Windows con jpackage (Incluye máquina virtual Java propia)
      - name: Construir el ejecutable Windows
        run: |
          jpackage --type app-image --name TallerII --input build/libs --main-jar TallerII-1.0-SNAPSHOT.jar --main-class com.programacion.Principal --dest build/jpackage
          Compress-Archive -Path "build/jpackage/TallerII" -DestinationPath "TallerII-Windows-Standalone.zip"
        shell: pwsh

      # Tomar los archivos generados y publicarlos en GitHub Releases
      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v1
        with:
          # Adjuntamos el JAR y el archivo ZIP que contiene el EXE
          files: |
            build/libs/*.jar
            TallerII-Windows-Standalone.zip
          generate_release_notes: true # Genera las notas de la versión automáticamente usando los commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
